services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ultraball
      POSTGRES_USER: ub
      POSTGRES_PASSWORD: ub
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ub -d ultraball"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    ports:
      - "8777:8777"
    environment:
      DATABASE_URL: postgresql://ub:ub@postgres:5432/ultraball
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8777/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3777:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ultraball
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - postgres

volumes:
  pgdata:
  grafana_data:
