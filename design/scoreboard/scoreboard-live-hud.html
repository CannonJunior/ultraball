document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,227,227,.6)\">04<span style=\"animation:blink 1s step-end infinite\">:<\u002Fspan>12<\u002Fdiv>\n   <div style=\"display:flex;gap:5px\">\n    <span style=\"width:24px;height:5px;border-radius:2px;background:#19e3e3\"><\u002Fspan><span style=\"width:24px;height:5px;border-radius:2px;background:#19e3e3\"><\u002Fspan><span style=\"width:24px;height:5px;border-radius:2px;background:#19e3e3;box-shadow:0 0 10px #19e3e3;animation:pulseGlow 1.4s ease-in-out infinite\"><\u002Fspan><span style=\"width:24px;height:5px;border-radius:2px;background:rgba(255,255,255,.14)\"><\u002Fspan><span style=\"width:24px;height:5px;border-radius:2px;background:rgba(255,255,255,.14)\"><\u002Fspan>\n   <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;clip-path:polygon(34px 0,100% 0,100% 100%,0 100%);background:linear-gradient(-90deg,rgba(47,131,255,.28),rgba(47,131,255,.04));display:flex;align-items:center;justify-content:center;gap:16px;padding:0 30px\">\n   <div style=\"font:700 46px/.8 'Barlow Condensed';color:#fff;font-variant-numeric:tabular-nums\">{{ liveV }}<\u002Fdiv>\n   <div style=\"font:italic 700 44px/1 'Barlow Condensed';letter-spacing:.02em;color:#fff;text-shadow:0 2px 0 rgba(47,131,255,.6)\">VIPERS<\u002Fdiv>\n  <\u002Fdiv>\n <\u002Fdiv>\n <div style=\"position:relative;height:3px;background:linear-gradient(90deg,#ffcb3d 0 var(--ubfill),rgba(255,203,61,.35) var(--ubfill) 100%);animation:ubcharge 1.8s ease-out forwards;box-shadow:0 0 8px rgba(255,203,61,.3)\">\n  <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;background:#000;border:1.5px solid rgba(255,203,61,.6);display:flex;align-items:center;justify-content:center;z-index:3;box-shadow:0 0 10px rgba(255,203,61,.35)\">\n   <span style=\"width:20px;height:20px;border-radius:50%;background:linear-gradient(180deg,#ffcb3d 0 42%,#fff 42% 58%,#1a1c22 58% 100%);border:1px solid rgba(255,255,255,.3)\"><\u002Fspan>\n  <\u002Fdiv>\n <\u002Fdiv>\n <div style=\"position:relative;display:flex;justify-content:center;align-items:flex-start;gap:120px;padding:24px 20px 16px\">\n  <div style=\"display:flex;gap:9px\">\n   <sc-for list=\"{{ reaperRoster }}\" as=\"p\" hint-placeholder-count=\"7\">\n    <div style=\"width:44px;display:flex;flex-direction:column;align-items:center;gap:5px\">\n     <div style=\"width:41px;height:41px;border-radius:8px;background:linear-gradient(155deg,{{ p.color }},#1a0409);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font:700 19px 'Barlow Condensed';color:#fff;position:relative\">{{ p.badge }}<span style=\"position:absolute;bottom:-3px;right:-3px;font:700 8px ui-monospace;background:#000;border-radius:4px;padding:1px 3px;color:#ffcb3d\">{{ p.kills }}<\u002Fspan><\u002Fdiv>\n     <div style=\"width:37px;height:5px;border-radius:3px;background:rgba(255,255,255,.12);overflow:hidden\"><div style=\"height:100%;width: {{ p.hpPct }}%;background:{{ p.color }}\"><\u002Fdiv><\u002Fdiv>\n     <span style=\"font:600 8px 'Chakra Petch';letter-spacing:.04em;color:rgba(255,255,255,.5)\">{{ p.cls }}<\u002Fspan>\n    <\u002Fdiv>\n   <\u002Fsc-for>\n  <\u002Fdiv>\n  <div style=\"display:flex;gap:9px\">\n   <sc-for list=\"{{ viperRoster }}\" as=\"p\" hint-placeholder-count=\"7\">\n    <div style=\"width:44px;display:flex;flex-direction:column;align-items:center;gap:5px\">\n     <div style=\"width:41px;height:41px;border-radius:8px;background:linear-gradient(155deg,{{ p.color }},#04102a);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font:700 19px 'Barlow Condensed';color:#fff;position:relative\">{{ p.badge }}<span style=\"position:absolute;bottom:-3px;left:-3px;font:700 8px ui-monospace;background:#000;border-radius:4px;padding:1px 3px;color:#ffcb3d\">{{ p.kills }}<\u002Fspan><\u002Fdiv>\n     <div style=\"width:37px;height:5px;border-radius:3px;background:rgba(255,255,255,.12);overflow:hidden\"><div style=\"height:100%;width: {{ p.hpPct }}%;background:{{ p.color }};float:right\"><\u002Fdiv><\u002Fdiv>\n     <span style=\"font:600 8px 'Chakra Petch';letter-spacing:.04em;color:rgba(255,255,255,.5)\">{{ p.cls }}<\u002Fspan>\n    <\u002Fdiv>\n   <\u002Fsc-for>\n  <\u002Fdiv>\n <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1720,&quot;height&quot;:420}}\">\nclass Component extends DCLogic {\n  state = { reaperOpen: false, viperOpen: false };\n  dyn() {\n    const s = this.state;\n    const sk = s.sortKey || 'points';\n    const sd = s.sortDir || 'desc';\n    const base = (this._v && this._v.scoreBase) || [];\n    const leader = (this._v && this._v.pointsLeaderName) || '';\n    const sorted = [...base].sort((a, b) => {\n      if (sk === 'name') return sd === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);\n      return sd === 'asc' ? a[sk] - b[sk] : b[sk] - a[sk];\n    }).map((p, i) => ({ ...p,\n      rank: i + 1, rankF: String(i + 1).padStart(2, '0'),\n      rowBg: p.name === leader ? 'rgba(255,203,61,.09)' : (p.team === 'R' ? 'rgba(255,59,83,.05)' : 'rgba(47,131,255,.05)'),\n      rankColor: p.name === leader ? '#ffcb3d' : 'rgba(255,255,255,.5)' }));\n    const arrow = k => sk === k ? (sd === 'asc' ? ' \\u25B2' : ' \\u25BC') : ' \\u21C5';\n    const setSort = k => this.setState(st => {\n      const ck = st.sortKey || 'points', cd = st.sortDir || 'desc';\n      return ck === k ? { sortDir: cd === 'asc' ? 'desc' : 'asc' } : { sortKey: k, sortDir: k === 'name' ? 'asc' : 'desc' };\n    });\n    return {\n      reaperOpen: s.reaperOpen, viperOpen: s.viperOpen,\n      rHiW: s.reaperOpen ? 340 : 0, vHiW: s.viperOpen ? 340 : 0,\n      toggleR: () => this.setState(st => ({ reaperOpen: !st.reaperOpen })),\n      toggleV: () => this.setState(st => ({ viperOpen: !st.viperOpen })),\n      scoreRows: sorted,\n      sortByName: () => setSort('name'), sortByDmg: () => setSort('dmg'),\n      sortByHeal: () => setSort('heal'), sortByPoints: () => setSort('points'), sortByFf: () => setSort('ff'),\n      arrowName: arrow('name'), arrowDmg: arrow('dmg'), arrowHeal: arrow('heal'),\n      arrowPoints: arrow('points'), arrowFf: arrow('ff'),\n    };\n  }\n  renderVals() {\n    if (this._v) return Object.assign({}, this._v, this.dyn());\n    const S = 512;\n    const R = '#ff3b53', V = '#2f83ff';\n    const fmt = n => n.toLocaleString('en-US');\n    const mk = (name, cls, team, dmg, heal, kills, deaths, taken, obj, hpPct, ub, ca) => {\n      const color = team === 'R' ? R : V;\n      const points = kills * 3 + ub * 5 + ca * 2;\n      return { name, cls, team, color, dmg, heal, kills, deaths, taken, obj, ff: obj, hpPct,\n        ub, ca, kb: kills, points,\n        dps: Math.round(dmg / S), hps: Math.round(heal / S), badge: name[0] };\n    };\n    const reapers = [\n      mk('FANG','SPECTRE','R',84210,0,14,3,41200,6,72,2,3),\n      mk('EMBER','HEX','R',91500,0,11,5,33000,1,44,1,1),\n      mk('PYRE','SABER','R',78900,0,12,6,44500,0,0,0,0),\n      mk('ZERO','VOLT','R',61200,0,8,4,37000,5,61,3,2),\n      mk('RIVET','TITAN','R',52300,0,6,4,88400,2,88,1,0),\n      mk('ONYX','WARDEN','R',47800,12400,5,2,51000,3,79,2,4),\n      mk('SALVE','MEDIC','R',9800,96400,1,3,22000,4,54,0,1),\n    ];\n    const vipers = [\n      mk('NEEDLE','SPECTRE','V',88700,0,13,4,39000,4,66,2,2),\n      mk('MAMBA','HEX','V',82300,0,10,6,30500,2,0,1,1),\n      mk('VENOM','SABER','V',73400,0,9,7,42000,1,0,0,0),\n      mk('ARC','VOLT','V',66800,0,7,5,35500,3,48,3,3),\n      mk('COBALT','TITAN','V',49500,0,4,5,92100,1,71,1,0),\n      mk('GLASS','WARDEN','V',51200,9800,6,3,48000,3,58,2,3),\n      mk('MEND','MEDIC','V',7600,88200,0,4,19500,2,63,0,2),\n    ];\n    const all = [...reapers, ...vipers];\n    const maxDmg = Math.max(...all.map(p => p.dmg));\n    const maxHeal = Math.max(...all.map(p => p.heal));\n    const dec = p => ({ ...p,\n      dmgF: fmt(p.dmg), healF: p.heal ? fmt(p.heal) : '—', takenF: fmt(p.taken),\n      dpsF: fmt(p.dps), hpsF: p.hps ? fmt(p.hps) : '—',\n      dmgPct: Math.round(p.dmg / maxDmg * 100),\n      healPct: p.heal ? Math.round(p.heal / maxHeal * 100) : 0 });\n    const decAll = all.map(dec);\n    const bg = t => t === 'R' ? 'rgba(255,59,83,.05)' : 'rgba(47,131,255,.05)';\n    const byDmg = [...decAll].sort((a, b) => b.dmg - a.dmg).map((p, i) => ({ ...p,\n      rank: i + 1, rankF: String(i + 1).padStart(2, '0'),\n      rowBg: i === 0 ? 'rgba(255,203,61,.09)' : bg(p.team),\n      rankColor: i === 0 ? '#ffcb3d' : 'rgba(255,255,255,.5)' }));\n    const reaperRoster = decAll.filter(p => p.team === 'R').sort((a, b) => b.dmg - a.dmg);\n    const viperRoster = decAll.filter(p => p.team === 'V').sort((a, b) => b.dmg - a.dmg);\n    const healers = decAll.filter(p => p.heal > 0).sort((a, b) => b.heal - a.heal);\n    const healMeter = healers.slice(0, 4);\n    const maxPoints = Math.max(...decAll.map(p => p.points));\n    const byPoints = [...decAll].sort((a, b) => b.points - a.points).map((p, i) => ({ ...p,\n      rank: i + 1, rankF: String(i + 1).padStart(2, '0'),\n      rowBg: i === 0 ? 'rgba(255,203,61,.09)' : (p.team === 'R' ? 'rgba(255,59,83,.05)' : 'rgba(47,131,255,.05)'),\n      rankColor: i === 0 ? '#ffcb3d' : 'rgba(255,255,255,.5)',\n      pointsPct: Math.round(p.points / maxPoints * 100) }));\n    const sum = (arr, k) => arr.reduce((s, p) => s + p[k], 0);\n    this._v = { R, V, act: 'ACT III', fmtDur: '08:32',\n      liveR: 2, liveV: 1, finalR: 3, finalV: 2,\n      reaperRoster, viperRoster, healMeter, mvp: byDmg[0],\n      rKills: sum(reapers, 'kills'), vKills: sum(vipers, 'kills'),\n      byPoints, pointsMVP: byPoints[0], scoreBase: decAll, pointsLeaderName: byPoints[0].name,\n      rPoints: sum(reapers, 'points'), vPoints: sum(vipers, 'points') };\n    return Object.assign({}, this._v, this.dyn());\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
